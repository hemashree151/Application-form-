<!DOCTYPE html>
<html>
<head>
    <title>Hema Application</title>

    <style>
        body {
            font-family: "Times New Roman", serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
        }

        .container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #successPage {
            display: none;
        }
    </style>
</head>

<body>

<!-- FORM PAGE -->
<div class="container" id="formPage">
    <h2>Hema Application</h2>

    <label>Name</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <label>Date of Birth</label>
    <input type="date" id="dob" required>

    <label>School Name</label>
    <input type="text" id="school" placeholder="Enter school name" required>

    <label>Completion Year</label>
    <input type="number" id="year" placeholder="Enter year" required>

    <label>College Name</label>
    <input type="text" id="college" placeholder="Enter college name">

    <label>Degree</label>
    <select id="degree" onchange="checkOther()">
        <option>Diploma</option>
        <option>BSc</option>
        <option>B Tech</option>
        <option>B Engg</option>
        <option>Other</option>
    </select>

    <input type="text" id="otherDegree" placeholder="Enter your degree" style="display:none;">

    <label>Address</label>
    <textarea id="address" placeholder="Enter address"></textarea>

    <label>State</label>
    <select id="state">
        <option value="">Select State</option>
        <option>Tamil Nadu</option>
        <option>Kerala</option>
        <option>Karnataka</option>
        <option>Andhra Pradesh</option>
        <option>Telangana</option>
        <option>Maharashtra</option>
        <option>Delhi</option>
        <option>Uttar Pradesh</option>
        <option>Gujarat</option>
        <option>Rajasthan</option>
        <option>West Bengal</option>
        <option>Punjab</option>
        <option>Haryana</option>
        <option>Odisha</option>
        <option>Bihar</option>
        <option>Madhya Pradesh</option>
    </select>

    <button onclick="submitForm()">Submit</button>
</div>

<!-- SUCCESS PAGE -->
<div class="container" id="successPage">
    <h2>✅ Application Submitted Successfully</h2>

    <button onclick="downloadFile()">Download</button>
    <button onclick="exitPage()">Exit</button>
</div>

<script>
let formData = "";

// SHOW OTHER DEGREE
function checkOther() {
    let degree = document.getElementById("degree").value;

    if (degree === "Other") {
        document.getElementById("otherDegree").style.display = "block";
    } else {
        document.getElementById("otherDegree").style.display = "none";
    }
}

// SUBMIT
function submitForm() {

    let name = document.getElementById("name").value;
    let dob = document.getElementById("dob").value;
    let school = document.getElementById("school").value;
    let year = document.getElementById("year").value;
    let college = document.getElementById("college").value;
    let degree = document.getElementById("degree").value;
    let otherDegree = document.getElementById("otherDegree").value;
    let address = document.getElementById("address").value;
    let state = document.getElementById("state").value;

    let selectedDegree = degree === "Other" ? otherDegree : degree;

    formData = `
Centre Aliment Application

Name: ${name}
Date of Birth: ${dob}
School: ${school}
Year: ${year}
College: ${college}
Degree: ${selectedDegree}
Address: ${address}
State: ${state}
    `;

    document.getElementById("formPage").style.display = "none";
    document.getElementById("successPage").style.display = "block";
}

// DOWNLOAD FILE
function downloadFile() {
    let blob = new Blob([formData], { type: "text/plain" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "Application.txt";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// EXIT
function exitPage() {
    location.reload();
}
</script>

</body>
</html>
